# ============== MISSION ==============
mission_node:
  ros__parameters:
    mission_depth_m: 1.0           # Competition pool depth target
    mission_timeout_sec: 900.0     # 15 minute mission window
    tick_rate: 20.0                # Behavior tree tick rate (Hz) — matches pidtest's 20 Hz control loop
    chosen_role: 'survey_repair'   # Pre-race coin-flip choice: survey_repair | search_rescue

    # ---- Per-task enable/disable ----
    # false = skip that task entirely (not even ticked). The transit leg right
    # before a disabled task still runs, so the sub still relocates there.
    run_gate: true
    run_slalom: true
    run_torpedoes: true
    run_octagon: true
    run_return_home: true

    # ---- Coin-flip heading recovery ----
    # Before arming: record the FOG heading (points at the gate), wait the
    # countdown while the crew repositions the (unarmed) sub, then after diving
    # PID-yaw back to that recorded heading. Disable to use the old fixed
    # opening maneuver (initial_turn_deg / initial_forward_m) instead.
    coin_flip_enabled: true
    coin_flip_countdown_sec: 15.0

    # ---- "Turn to a target heading" PID (single source of truth) ----
    # Shared by gate.HeadingTurn and pre_dive.YawToRecordedHeading — both PID-turn
    # this same vehicle to a target heading with no concurrent surge, so they use
    # one tuned gain set. yaw_controller_node (a separate node/process) has its
    # own identical-by-default yaw_kp/ki/kd/yaw_output_limit — keep both in sync.
    heading_turn_kp: 0.225
    heading_turn_ki: 0.0
    heading_turn_kd: 0.2
    heading_turn_output_limit: 0.6

    # ---- Gate approach / pass-through (closed-loop ZED/PID forward legs) ----
    # Find gate -> drive forward gate_approach_forward_m -> strafe to center the
    # role symbol -> drive forward gate_passthrough_forward_m through the gate.
    gate_approach_forward_m: 1.5
    gate_passthrough_forward_m: 2.5
    # While centering on the role symbol, if it isn't visible yet, strafe this
    # direction ('left'/'right') until it comes into frame. Both the search and
    # the centering strafe use this same slow speed cap the whole way in.
    gate_align_search_side: 'right'
    gate_align_search_speed: 0.15
    gate_align_strafe_max: 0.15

    # After the gate + 2x style spin, dive this much DEEPER for the dead-reckon
    # slalom legs and everything after.
    slalom_extra_depth_m: 0.5

    # Per-mission time budgets (s). Each subtree splits its budget across its own
    # timeout-bearing behaviors, preserving tuned ratios. Sum can exceed
    # mission_timeout_sec — the global cap wins, later tasks get squeezed.
    gate_timeout_sec: 240.0
    torpedoes_timeout_sec: 240.0
    octagon_timeout_sec: 240.0
    return_home_timeout_sec: 240.0

    # Octagon (Task 5) knobs — tune in-water without code edits. No vision:
    # EnterOctagon is a plain closed-loop ZED/PID advance, same as every other leg.
    octagon_advance_distance_m: 3.0   # ZED/PID advance into the octagon interior
    octagon_surge: 0.3
    octagon_settle_sec: 2.0
    octagon_surface_depth_m: 0.3

    # ---- Opening maneuver (right after submerge, before the tasks) ----
    # Turn a set amount, then advance. Uses the movement_mode below for the
    # advance. Set initial_turn_deg to 0 to skip the turn, initial_forward_m to 0
    # to skip the advance.
    # Turn is RELATIVE to the heading at submerge, compass-style: positive =
    # CLOCKWISE (right, viewed from above), negative = counterclockwise. The
    # turn always goes the SHORT way to the final heading, so 270 executes as
    # a 90° counterclockwise turn (same end heading).
    # Set per run to 90 / 180 / 270 depending on start-dock orientation; 0 = none.
    initial_turn_deg: 0.0            # degrees to rotate after submerge: 90 / 180 / 270 (0 = none; sub stays pointed forward at start)
    initial_forward_m: 2.0           # metres to advance after the turn
    initial_turn_timeout_sec: 15.0   # safety cap on the turn (270° needs more time than 90°)

    # ---- Heading hold (every translating behavior) ----
    # PD gains + clamp for the yaw correction that keeps the sub on its locked
    # FOG/IMU heading while it surges/strafes. Defaults = the pool-proven
    # pidtest companion heading-hold (kp 0.45 / kd 0.2). ALL live-tunable
    # without restart:  ros2 param set /mission_node yaw_hold_kp 0.3
    # If the sub WEAVES/crabs while driving straight, lower kp (or raise kd);
    # if it drifts off heading and corrects too lazily, raise kp.
    # yaw_hold_sign: correction direction (-1.0 = validated convention, same
    # as pidtest yaw_command_sign). Flip to 1.0 LIVE to test the opposite:
    #   ros2 param set /mission_node yaw_hold_sign 1.0
    # Quick isolation test: set yaw_hold_kp to 0.0 to disable heading
    # correction entirely — if the sub STILL crabs, the problem is hardware
    # (thruster trim/direction), not the yaw correction.
    yaw_hold_kp: 0.225
    yaw_hold_kd: 0.2
    yaw_hold_limit: 0.6        # pidtest's companion is unclamped (±1) — lower only if a glitch ever spins the sub
    yaw_hold_sign: -1.0

    # ---- Movement mode: ZED odometry vs open-loop dead reckoning ----
    # 'zed'        = measure travel with ZED odometry (accurate, closed-loop).
    # 'dead_reckon'= open-loop timed drive (distance / dead_reckon_mps) — use if
    #                ZED odometry is down/unreliable in the pool.
    # Applies to the inter-mission transits and the bin/octagon "advance N m" legs.
    movement_mode: 'zed'              # 'zed' or 'dead_reckon'
    # ZED transits are a LITERAL PORT of the pidtest surge loop. For identical
    # motion, these MUST be the values you ran pidtest with:
    #   transit_thrust   = pidtest max_output   (its default: 0.6)
    #   transit_kp/ki/kd = the surge gains you converged on in the pool
    transit_thrust: 0.6              # POWER cap (PID output clamp), = pidtest max_output
    dead_reckon_mps: 0.4             # measured speed (m/s) AT transit_thrust; sets time = dist/mps
    transit_kp: 0.2                  # <<< REPLACE with your tuned pidtest surge kp
    transit_ki: 0.0                  # <<< REPLACE with your tuned pidtest surge ki
    transit_kd: 0.05                 # <<< REPLACE with your tuned pidtest surge kd

    # ---- Course + inter-mission dead-reckon transits ----
    # Courses A and D are DIFFERENT layouts. Fill in BOTH sets; `course` picks
    # which one runs. Blind-drive a body-frame (forward, lateral) offset on ZED
    # odometry between tasks, THEN the next task visually acquires. Metres;
    # lateral +right. 0.0 = disabled (creep-and-search). >>> MEASURE IN POOL. <<<
    course: 'D'                       # 'A' or 'D'

    # --- Course A distances ---
    transit_A_to_slalom_forward_m: 0.0
    transit_A_to_slalom_lateral_m: 0.0
    transit_A_to_bins_forward_m: 0.0
    transit_A_to_bins_lateral_m: 0.0
    transit_A_to_torpedoes_forward_m: 0.0
    transit_A_to_torpedoes_lateral_m: 0.0
    transit_A_to_octagon_forward_m: 0.0
    transit_A_to_octagon_lateral_m: 0.0

    # --- Course D distances ---
    transit_D_to_slalom_forward_m: 1.0
    transit_D_to_slalom_lateral_m: 0.0
    transit_D_to_bins_forward_m: 0.5
    transit_D_to_bins_lateral_m: 2.5
    transit_D_to_torpedoes_forward_m: 1.5
    transit_D_to_torpedoes_lateral_m: -6.0
    transit_D_to_octagon_forward_m: 0.0
    transit_D_to_octagon_lateral_m: 0.0

    # ---- Dead-reckon slalom legs (closed-loop ZED odometry / PID) ----
    # After the gate, the slalom is navigated as a series of hardcoded body-frame
    # (forward, lateral) hops — NO vision. lateral is +right. Legs left at 0/0
    # are skipped, so fill in as many of the 4 slots as you need, in order.
    # >>> MEASURE THESE IN THE POOL PER COURSE. <<<
    # Example flow for course D: leg1 nudges past the gate exit, legs 2-4 weave
    # the slalom; the forward+lateral to the torpedo board is the separate
    # transit_D_to_torpedoes_* below-the-slalom leg, NOT counted here.
    # --- Course A slalom legs ---
    slalom_A_leg1_forward_m: 0.0
    slalom_A_leg1_lateral_m: 0.0
    slalom_A_leg2_forward_m: 0.0
    slalom_A_leg2_lateral_m: 0.0
    slalom_A_leg3_forward_m: 0.0
    slalom_A_leg3_lateral_m: 0.0
    slalom_A_leg4_forward_m: 0.0
    slalom_A_leg4_lateral_m: 0.0
    # --- Course D slalom legs ---
    slalom_D_leg1_forward_m: 1.0    # e.g. 1 m forward off the gate exit
    slalom_D_leg1_lateral_m: 1.0    # e.g. 1 m right
    slalom_D_leg2_forward_m: 0.0
    slalom_D_leg2_lateral_m: 0.0
    slalom_D_leg3_forward_m: 0.0
    slalom_D_leg3_lateral_m: 0.0
    slalom_D_leg4_forward_m: 0.0
    slalom_D_leg4_lateral_m: 0.0

# ============== CONTROL ==============
rc_override_node:
  ros__parameters:
    publish_rate: 20.0
    max_pwm: 1900
    min_pwm: 1100
    neutral_pwm: 1500
    deadzone: 0.05
    timeout_sec: 0.5              # Safety timeout — neutral after 500ms silence

depth_controller_node:
  ros__parameters:
    kp: 300.0
    ki: 35.0
    kd: 0.0
    max_output: 400
    depth_tolerance: 0.5          # meters
    integral_max: 100.0

mode_manager_node:
  ros__parameters:
    barrel_roll_duration_sec: 3.0
    barrel_roll_pwm: 1900

# ============== PERCEPTION ==============
yolo_detector_node:
  ros__parameters:
    # Front-facing-camera (ffc) 8-class instance-SEGMENTATION model (YOLO*-seg).
    # Export the .pt to a TensorRT engine ON THE ZED BOX first (engines aren't
    # portable across TensorRT/GPU versions):
    #   python3 src/perception/scripts/export_yolo_seg_engine.py \
    #       --pt ffc_seg.pt --out /home/user/models/ffc_seg.engine --imgsz 640 --half
    # (equivalently `yolo export model=ffc_seg.pt format=engine imgsz=640` —
    # same command as a detect model, but do NOT pass nms=True or the mask
    # coefficients are stripped.) The class list must match
    # hightide_perception.CLASS_NAMES (see that file).
    engine_path: '/home/user/models/ffc_seg.engine'
    confidence_threshold: 0.5
    nms_threshold: 0.45
    input_width: 640
    input_height: 640
    mask_threshold: 0.5           # sigmoid cutoff for turning proto masks into pixels
    publish_viz: true

# Ultralytics-API detector (.pt OR .engine) — the node full_system.launch.py
# actually runs. model_path is supplied by the `yolo_model` launch arg (not here,
# so it isn't clobbered). Switch to a .engine by pointing yolo_model at it — no
# other change needed. A .pt is ~2-4x slower than a hand-tuned engine but needs
# no build; fine for bring-up / pool testing.
yolo_pt_detector_node:
  ros__parameters:
    image_topic: '/mavros/zed/rgb/color/rect/image'
    confidence_threshold: 0.5
    iou_threshold: 0.45           # Ultralytics NMS IoU
    imgsz: 640                    # must match the model's training/export size
    half: true                    # FP16 on GPU (set false for CPU / debugging)
    device: '0'                   # CUDA index, or 'cpu'
    publish_viz: true

target_tracker_node:
  ros__parameters:
    max_tracking_age: 1.0         # seconds before track expires
    iou_threshold: 0.3
    depth_sample_radius: 5        # pixels
# Classical-CV slalom pole detector (RGB only). Tune against the in-water
# footage (slalom_woollett / slalom_airbnb) while watching
# /hightide/slalom_poles_image.
slalom_pole_detector_node:
  ros__parameters:
    image_topic: '/mavros/zed/rgb/color/rect/image'
    canny_low: 40
    canny_high: 120
    min_height_frac: 0.30         # a pole spans >= this fraction of frame height
    max_width_frac: 0.20          # ...and is narrower than this fraction of width
    min_aspect: 2.5               # height/width >= this (tall & narrow)
    close_kernel_h: 25            # vertical morphology to join a pole's two edges
    red_sat_min: 70               # HSV saturation to call a pole red (underwater red is weak)
    red_val_min: 40
    temporal_window: 5            # M-of-N filter: look at the last N frames...
    temporal_min_hits: 3          # ...and only publish a pole seen in >= M of them
    cluster_x_tol_frac: 0.06      # x tolerance to match the "same" pole across frames
    publish_viz: true

# ============== LOCALIZATION ==============
nav_tier_manager_node:
  ros__parameters:
    vslam_confidence_threshold: 0.80
    vio_confidence_threshold: 0.30
    stale_timeout_sec: 1.0

# ============== NAVIGATION ==============
waypoint_navigator_node:
  ros__parameters:
    surge_kp: 0.2
    surge_ki: .0
    surge_kd: 0.0
    sway_kp: 0.2
    sway_ki: 0.0
    sway_kd: 0.05
    yaw_kp: 0.45
    yaw_ki: 0.0
    yaw_kd: 0.2
    position_tolerance: 0.3      # meters
    yaw_tolerance: 0.1           # radians (~5.7°)
    max_speed: 0.6

vision_servo_node:
  ros__parameters:
    lateral_kp: 1.5
    lateral_ki: 0.05
    lateral_kd: 0.3
    vertical_kp: 1.0
    vertical_ki: 0.05
    vertical_kd: 0.2
    range_kp: 0.8
    range_ki: 0.02
    range_kd: 0.15
    approach_distance_m: 1.0

yaw_controller_node:
  ros__parameters:
    # rotate_to_heading() (used after the style spin, and by /hightide/set_heading)
    # does the SAME "PID-turn to a target heading" action as mission_node's
    # heading_turn_kp/ki/kd/output_limit (gate.HeadingTurn / YawToRecordedHeading)
    # — keep these two in sync when retuning in the pool.
    yaw_kp: 0.225
    yaw_ki: 0.0
    yaw_kd: 0.2
    yaw_output_limit: 0.6
    yaw_tolerance: 0.05          # radians (~2.9°)
    spin_speed: 0.6              # open-loop rate for the spin itself (not PID — see execute_spin)
    spin_count: 2                # /hightide/yaw_spin does this many full 360°s (gate style points)
    spin_timeout: 45.0          # must cover spin_count turns at spin_speed (2 turns ~= 21s @ 0.6 rad/s)

dead_reckoning_node:
  ros__parameters:
    surge_speed: 0.4
    sway_speed: 0.3
    speed_to_mps: 0.5            # Calibrate! Thrust→velocity conversion

search_pattern_node:
  ros__parameters:
    pattern_type: 'expanding_square'
    leg_length_m: 2.0
    leg_increment_m: 1.0
    search_speed: 0.3
    timeout_sec: 120.0
    search_kp: 2.0
    search_ki: 0.1
    search_kd: 0.5

# ============== DRIVERS ==============
actuator_driver_node:
  ros__parameters:
    torpedo_1_pin: 0.0
    torpedo_2_pin: 1.0
    dropper_1_pin: 2.0
    dropper_2_pin: 3.0
    pulse_duration_ms: 500
    fire_max_attempts: 4