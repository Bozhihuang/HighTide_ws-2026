# ============== MISSION ==============
mission_node:
  ros__parameters:
    mission_depth_m: 1.0           # Competition pool depth target
    mission_timeout_sec: 900.0     # 15 minute mission window
    tick_rate: 10.0                # Behavior tree tick rate (Hz)
    chosen_role: 'survey_repair'   # Pre-race coin-flip choice: survey_repair | search_rescue

    # Per-mission time budgets (s). Each subtree splits its budget across its own
    # timeout-bearing behaviors, preserving tuned ratios. Sum can exceed
    # mission_timeout_sec — the global cap wins, later tasks get squeezed.
    gate_timeout_sec: 240.0
    slalom_timeout_sec: 240.0
    bins_timeout_sec: 240.0
    torpedoes_timeout_sec: 240.0
    octagon_timeout_sec: 240.0
    return_home_timeout_sec: 240.0

    # Octagon (Task 5) knobs — tune in-water without code edits.
    octagon_advance_distance_m: 3.0   # blind odom advance if no visual cue
    octagon_surge: 0.3
    octagon_buoy_fill_frac: 0.7       # buoy box spans this frac of frame => inside
    octagon_table_fill_frac: 0.6      # under-octagon table spans this => inside
    octagon_table_class: 'octagon_table'
    octagon_confidence: 0.4
    octagon_settle_sec: 2.0
    octagon_surface_depth_m: 0.3

    # ---- Movement mode: ZED odometry vs open-loop dead reckoning ----
    # 'zed'        = measure travel with ZED odometry (accurate, closed-loop).
    # 'dead_reckon'= open-loop timed drive (distance / dead_reckon_mps) — use if
    #                ZED odometry is down/unreliable in the pool.
    # Applies to the inter-mission transits and the bin/octagon "advance N m" legs.
    movement_mode: 'zed'              # 'zed' or 'dead_reckon'
    dead_reckon_mps: 0.4              # calibrated forward speed (m/s) at transit thrust

    # ---- Course + inter-mission dead-reckon transits ----
    # Courses A and D are DIFFERENT layouts. Fill in BOTH sets; `course` picks
    # which one runs. Blind-drive a body-frame (forward, lateral) offset on ZED
    # odometry between tasks, THEN the next task visually acquires. Metres;
    # lateral +right. 0.0 = disabled (creep-and-search). >>> MEASURE IN POOL. <<<
    course: 'A'                       # 'A' or 'D'

    # --- Course A distances ---
    transit_A_to_slalom_forward_m: 0.0
    transit_A_to_slalom_lateral_m: 0.0
    transit_A_to_bins_forward_m: 0.0
    transit_A_to_bins_lateral_m: 0.0
    transit_A_to_torpedoes_forward_m: 0.0
    transit_A_to_torpedoes_lateral_m: 0.0
    transit_A_to_octagon_forward_m: 0.0
    transit_A_to_octagon_lateral_m: 0.0

    # --- Course D distances ---
    transit_D_to_slalom_forward_m: 2.5
    transit_D_to_slalom_lateral_m: -2.0
    transit_D_to_bins_forward_m: 1.0
    transit_D_to_bins_lateral_m: 3.0
    transit_D_to_torpedoes_forward_m: 3.0
    transit_D_to_torpedoes_lateral_m: 1.0
    transit_D_to_octagon_forward_m: 0.0
    transit_D_to_octagon_lateral_m: 0.0

# ============== CONTROL ==============
rc_override_node:
  ros__parameters:
    publish_rate: 20.0
    max_pwm: 1900
    min_pwm: 1100
    neutral_pwm: 1500
    deadzone: 0.05
    timeout_sec: 0.5              # Safety timeout — neutral after 500ms silence

depth_controller_node:
  ros__parameters:
    kp: 300.0
    ki: 35.0
    kd: 0.0
    max_output: 400
    depth_tolerance: 0.1          # meters
    integral_max: 100.0

mode_manager_node:
  ros__parameters:
    barrel_roll_duration_sec: 3.0
    barrel_roll_pwm: 1900

# ============== PERCEPTION ==============
yolo_detector_node:
  ros__parameters:
    # Front-facing-camera (ffc) 8-class instance-SEGMENTATION model (YOLO*-seg).
    # Export the .pt to a TensorRT engine ON THE ZED BOX first (engines aren't
    # portable across TensorRT/GPU versions):
    #   python3 src/perception/scripts/export_yolo_seg_engine.py \
    #       --pt ffc_seg.pt --out /home/user/models/ffc_seg.engine --imgsz 640 --half
    # (equivalently `yolo export model=ffc_seg.pt format=engine imgsz=640` —
    # same command as a detect model, but do NOT pass nms=True or the mask
    # coefficients are stripped.) The class list must match
    # hightide_perception.CLASS_NAMES (see that file).
    engine_path: '/home/user/models/ffc_seg.engine'
    confidence_threshold: 0.5
    nms_threshold: 0.45
    input_width: 640
    input_height: 640
    mask_threshold: 0.5           # sigmoid cutoff for turning proto masks into pixels
    publish_viz: true

# Ultralytics-API detector (.pt OR .engine) — the node full_system.launch.py
# actually runs. model_path is supplied by the `yolo_model` launch arg (not here,
# so it isn't clobbered). Switch to a .engine by pointing yolo_model at it — no
# other change needed. A .pt is ~2-4x slower than a hand-tuned engine but needs
# no build; fine for bring-up / pool testing.
yolo_pt_detector_node:
  ros__parameters:
    image_topic: '/mavros/zed/rgb/color/rect/image'
    confidence_threshold: 0.5
    iou_threshold: 0.45           # Ultralytics NMS IoU
    imgsz: 640                    # must match the model's training/export size
    half: true                    # FP16 on GPU (set false for CPU / debugging)
    device: '0'                   # CUDA index, or 'cpu'
    publish_viz: true

target_tracker_node:
  ros__parameters:
    max_tracking_age: 1.0         # seconds before track expires
    iou_threshold: 0.3
    depth_sample_radius: 5        # pixels
# Classical-CV slalom pole detector (RGB only). Tune against the in-water
# footage (slalom_woollett / slalom_airbnb) while watching
# /hightide/slalom_poles_image.
slalom_pole_detector_node:
  ros__parameters:
    image_topic: '/mavros/zed/rgb/color/rect/image'
    canny_low: 40
    canny_high: 120
    min_height_frac: 0.30         # a pole spans >= this fraction of frame height
    max_width_frac: 0.20          # ...and is narrower than this fraction of width
    min_aspect: 2.5               # height/width >= this (tall & narrow)
    close_kernel_h: 25            # vertical morphology to join a pole's two edges
    red_sat_min: 70               # HSV saturation to call a pole red (underwater red is weak)
    red_val_min: 40
    temporal_window: 5            # M-of-N filter: look at the last N frames...
    temporal_min_hits: 3          # ...and only publish a pole seen in >= M of them
    cluster_x_tol_frac: 0.06      # x tolerance to match the "same" pole across frames
    publish_viz: true

# ============== LOCALIZATION ==============
nav_tier_manager_node:
  ros__parameters:
    vslam_confidence_threshold: 0.80
    vio_confidence_threshold: 0.30
    stale_timeout_sec: 1.0

# ============== NAVIGATION ==============
waypoint_navigator_node:
  ros__parameters:
    surge_kp: 0.2
    surge_ki: .0
    surge_kd: 0.0
    sway_kp: 0.2
    sway_ki: 0.0
    sway_kd: 0.05
    yaw_kp: 0.45
    yaw_ki: 0.0
    yaw_kd: 0.2
    position_tolerance: 0.3      # meters
    yaw_tolerance: 0.1           # radians (~5.7°)
    max_speed: 0.6

vision_servo_node:
  ros__parameters:
    lateral_kp: 1.5
    lateral_ki: 0.05
    lateral_kd: 0.3
    vertical_kp: 1.0
    vertical_ki: 0.05
    vertical_kd: 0.2
    range_kp: 0.8
    range_ki: 0.02
    range_kd: 0.15
    approach_distance_m: 1.0

yaw_controller_node:
  ros__parameters:
    yaw_kp: 2.0
    yaw_ki: 0.1
    yaw_kd: 0.5
    yaw_tolerance: 0.05          # radians (~2.9°)
    spin_speed: 0.6
    spin_timeout: 30.0

dead_reckoning_node:
  ros__parameters:
    surge_speed: 0.4
    sway_speed: 0.3
    speed_to_mps: 0.5            # Calibrate! Thrust→velocity conversion

search_pattern_node:
  ros__parameters:
    pattern_type: 'expanding_square'
    leg_length_m: 2.0
    leg_increment_m: 1.0
    search_speed: 0.3
    timeout_sec: 120.0
    search_kp: 2.0
    search_ki: 0.1
    search_kd: 0.5

# ============== DRIVERS ==============
actuator_driver_node:
  ros__parameters:
    torpedo_1_pin: 0.0
    torpedo_2_pin: 1.0
    dropper_1_pin: 2.0
    dropper_2_pin: 3.0
    pulse_duration_ms: 500
    fire_max_attempts: 4